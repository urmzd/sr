# sr configuration
# Full reference: https://github.com/urmzd/sr#configuration

commit:
  types:
    minor: [feat]
    patch: [fix, perf, refactor]
    none: [docs, revert, chore, ci, test, build, style]

git:
  tag_prefix: "v"
  floating_tag: true
  sign_tags: false

channels:
  branch: main

changelog:
  file: CHANGELOG.md

packages:
  - path: "."
    version_files: [Cargo.toml]
    version_files_strict: false
    hooks:
      pre_release:
        - "cargo test --workspace"
