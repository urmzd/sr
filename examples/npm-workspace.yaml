# npm workspaces — one shared version across every member.
#
# Auto-detects the tool by lockfile (package-lock.json → npm).
# For a pnpm repo, drop `pnpm-lock.yaml` in and sr will switch to
# `pnpm publish -r` automatically. For yarn v3+, it uses
# `yarn workspaces foreach -A npm publish`.

git:
  tag_prefix: "v"

packages:
  - path: .
    version_files:
      - package.json
    stage_files:
      - package-lock.json
    publish:
      type: npm
      workspace: true
      access: public
