# Cargo workspace — every member publishes to crates.io at one shared version.
#
# One `packages[]` entry at the workspace root. `sr` auto-discovers
# `[workspace].members` when bumping the root Cargo.toml, and the `cargo`
# publisher with `workspace: true` iterates the same members for
# per-crate `check` + `cargo publish -p <name>`.
#
# Order tip: list your `members` in dependency order in Cargo.toml so
# leaf crates publish before their consumers (crates.io index takes
# ~30–60s to propagate).

git:
  tag_prefix: "v"

packages:
  - path: .
    version_files:
      - Cargo.toml
    stage_files:
      - Cargo.lock
    publish:
      type: cargo
      workspace: true
