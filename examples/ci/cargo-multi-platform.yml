# Rust CLI with pre-built binaries attached to the GitHub release for
# multiple platforms. Uses the `plan → prepare → build (matrix) → release`
# shape so each binary embeds the correct new version.
#
# Flow:
#   1. `prepare` bumps Cargo.toml to the planned next version and uploads
#      the bumped manifest as a workflow artifact.
#   2. Each build job downloads the bumped manifest, builds its target, and
#      uploads the binary as a workflow artifact.
#   3. `release` downloads all prepared files + binaries, commits, tags,
#      creates the GitHub release, uploads assets, and publishes.

name: Release
on:
  push:
    branches: [main]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.sr.outputs.version }}
      tag: ${{ steps.sr.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: urmzd/sr@v8
        id: sr
        with:
          mode: prepare

      - uses: actions/upload-artifact@v4
        with:
          name: prepared-manifests
          # Ship every file `sr prepare` may have touched.
          path: |
            Cargo.toml
            Cargo.lock
            CHANGELOG.md
            crates/**/Cargo.toml

  build:
    needs: prepare
    if: needs.prepare.outputs.version != ''
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: prepared-manifests
          path: .

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage artifact
        run: |
          mkdir -p release-assets
          cp "target/${{ matrix.target }}/release/sr" "release-assets/sr-${{ matrix.target }}"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: release-assets/sr-${{ matrix.target }}

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: prepared-manifests
          path: .

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: binary-*
          merge-multiple: true

      - uses: urmzd/sr@v8
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
