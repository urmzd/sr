# Single npm package release. `npm publish` packs from `package.json`
# in-place so no separate build step is needed.

name: Release
on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org/"

      - uses: urmzd/sr@v8
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
