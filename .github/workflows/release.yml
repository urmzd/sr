name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            cross: false
          - target: aarch64-apple-darwin
            runner: macos-15
            cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            cross: false
    steps:
      - uses: actions/checkout@v6
        with:
          path: sr

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          workspaces: sr

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Install cargo-auditable
        run: cargo install cargo-auditable

      - name: Build
        working-directory: sr
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p sr-cli
          else
            cargo auditable build --release --target ${{ matrix.target }} -p sr-cli
          fi
        shell: bash

      - name: Prepare artifact
        working-directory: sr
        run: |
          if [ -f "target/${{ matrix.target }}/release/sr.exe" ]; then
            cp "target/${{ matrix.target }}/release/sr.exe" "sr-${{ matrix.target }}.exe"
          else
            cp "target/${{ matrix.target }}/release/sr" "sr-${{ matrix.target }}"
            chmod +x "sr-${{ matrix.target }}"
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: sr-${{ matrix.target }}
          path: sr/sr-${{ matrix.target }}*

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.SR_RELEASER_APP_ID }}
          private-key: ${{ secrets.SR_RELEASER_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for dir in artifacts/sr-*/; do
            cp "$dir"/* release-assets/
          done
          chmod +x release-assets/sr-*[!e]
          ls -la release-assets/

      - name: Install sr from matrix artifact
        run: |
          install -m 0755 release-assets/sr-x86_64-unknown-linux-gnu /usr/local/bin/sr
          sr --version

      # Toolchain only needed for cargo publish (invoked by sr's typed cargo publisher).
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Run sr release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -uo pipefail
          set +e
          sr release | tail -1
          RC=${PIPESTATUS[0]}
          set -e
          if [ $RC -eq 0 ] || [ $RC -eq 2 ]; then
            exit 0
          fi
          exit $RC
