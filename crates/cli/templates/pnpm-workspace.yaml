# pnpm monorepo — every workspace member publishes at one shared version.
#
# `sr` auto-discovers workspace members from `pnpm-workspace.yaml`
# (or `package.json` `workspaces`), bumps each member's `package.json`
# on release, and runs `pnpm publish -r` which recursively publishes
# every non-private member. Packages already on the registry at the
# target version are skipped by pnpm itself.

git:
  tag_prefix: "v"

packages:
  - path: .
    version_files:
      - package.json
    stage_files:
      - pnpm-lock.yaml
    publish:
      type: npm
      workspace: true
      access: public        # required for scoped packages
