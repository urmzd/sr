name: "SR - Semantic Release"
description: "Declarative change/release management — one binary, VCS is state, commits are the diff."
author: "urmzd"

branding:
  icon: "upload-cloud"
  color: "green"

inputs:
  mode:
    description: >
      Which verb to run: `plan` (preview only, no side effects),
      `prepare` (bump manifests + changelog on disk, no commit/tag/push),
      or `release` (full reconcile — commit, tag, push, release, upload,
      publish). Default: `release`. A common multi-job CI shape is:
        job1  mode: plan    → outputs.version, .tag for downstream jobs
        job2  mode: prepare → writes bumped manifests (upload as artifact)
        build jobs read the bumped manifest (cargo/npm/uv/go picks up the
          new version) and produce release-ready binaries
        job3  mode: release → commits the prepared files, tags, uploads
    default: "release"
  dry-run:
    description: "Deprecated alias for `mode: plan`. Use `mode` instead."
    default: "false"
  github-token:
    description: "GitHub token for creating releases"
    default: ${{ github.token }}
  git-user-name:
    description: "Git author/committer name for the release commit and tag. Pass empty string to let sr.yaml (git.user.name) or the repo's local git config take over."
    default: "sr-releaser[bot]"
  git-user-email:
    description: "Git author/committer email for the release commit and tag. Pass empty string to let sr.yaml (git.user.email) or the repo's local git config take over."
    default: "sr-releaser[bot]@users.noreply.github.com"
  artifacts:
    description: "Literal paths to artifact files to upload (space-separated, passed as --artifacts)"
    default: ""
  channel:
    description: "Release channel name (e.g. canary, rc, stable) — must match a channel defined in sr.yaml"
    default: ""
  prerelease:
    description: "Pre-release identifier override (e.g. alpha, beta, rc). Overrides the channel's prerelease setting"
    default: ""
  stage-files:
    description: "Additional literal paths to stage in the release commit (space-separated)"
    default: ""
  sign-tags:
    description: "Sign tags with GPG/SSH. Overrides git.sign_tags in sr.yaml"
    default: "false"
  draft:
    description: "Create GitHub release as a draft. Overrides the channel's draft setting"
    default: "false"
  sha256:
    description: "Expected SHA256 checksum of the sr binary"
    default: ""

outputs:
  version:
    description: "Planned or released version. Populated for every mode."
    value: ${{ steps.sr.outputs.version }}
  previous-version:
    description: "Version before this release (empty if first release)"
    value: ${{ steps.sr.outputs.previous_version }}
  tag:
    description: "Git tag name (populated for every mode)"
    value: ${{ steps.sr.outputs.tag }}
  bump:
    description: "Bump level applied (major/minor/patch)"
    value: ${{ steps.sr.outputs.bump }}
  floating-tag:
    description: "Floating major tag (e.g. v3, empty if disabled)"
    value: ${{ steps.sr.outputs.floating_tag }}
  commit-count:
    description: "Number of commits in this release"
    value: ${{ steps.sr.outputs.commit_count }}
  released:
    description: "Whether a release was actually cut (mode=release only; true/false)"
    value: ${{ steps.sr.outputs.released }}
  json:
    description: "Full JSON output of the verb (empty if no release)"
    value: ${{ steps.sr.outputs.json }}

runs:
  using: "composite"
  steps:
    - name: Download sr binary
      shell: bash
      env:
        SR_REPO: ${{ github.action_repository }}
        SR_REF: ${{ github.action_ref }}
        SR_SHA256: ${{ inputs.sha256 }}
      run: |
        set -euo pipefail
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64)        ARCH="x86_64" ;;
          aarch64|arm64) ARCH="aarch64" ;;
          *) echo "::error::Unsupported architecture: $ARCH"; exit 1 ;;
        esac
        case "$OS" in
          linux)  TARGET="${ARCH}-unknown-linux-musl" ;;
          darwin) TARGET="${ARCH}-apple-darwin" ;;
          *) echo "::error::Unsupported OS: $OS"; exit 1 ;;
        esac

        DEST="$HOME/.local/bin/sr"
        mkdir -p "$HOME/.local/bin"

        API="https://api.github.com/repos/${SR_REPO}"
        TAGS=$(curl -fsSL "${API}/releases?per_page=100" | jq -r '.[].tag_name')
        RELEASE_TAG=$(echo "$TAGS" | grep -xF "$SR_REF" | head -1 || true)
        [ -z "$RELEASE_TAG" ] && RELEASE_TAG=$(echo "$TAGS" | grep "^${SR_REF}\." | head -1 || true)
        [ -z "$RELEASE_TAG" ] && RELEASE_TAG=$(echo "$TAGS" | head -1)

        if [ -z "$RELEASE_TAG" ]; then
          echo "::error::No releases found for ${SR_REPO}"
          exit 1
        fi

        curl -fsSL "https://github.com/${SR_REPO}/releases/download/${RELEASE_TAG}/sr-${TARGET}" -o "$DEST"

        if [ -n "$SR_SHA256" ]; then
          ACTUAL=$(sha256sum "$DEST" | awk '{print $1}')
          if [ "$ACTUAL" != "$SR_SHA256" ]; then
            echo "::error::SHA256 mismatch: expected $SR_SHA256, got $ACTUAL"
            exit 1
          fi
        fi

        chmod +x "$DEST"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Run sr
      id: sr
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -uo pipefail

        # Resolve mode. `dry-run: true` is a back-compat alias for `mode: plan`.
        MODE="${{ inputs.mode }}"
        if [ "${{ inputs.dry-run }}" = "true" ]; then
          MODE="plan"
        fi

        case "$MODE" in
          plan)
            CMD="plan --format json"
            ;;
          prepare)
            CMD="prepare"
            if [ -n "${{ inputs.prerelease }}" ]; then
              CMD="$CMD --prerelease ${{ inputs.prerelease }}"
            fi
            ;;
          release)
            CMD="release"
            if [ -n "${{ inputs.artifacts }}" ]; then
              for p in ${{ inputs.artifacts }}; do
                CMD="$CMD --artifacts \"$p\""
              done
            fi
            if [ -n "${{ inputs.channel }}" ]; then
              CMD="$CMD --channel ${{ inputs.channel }}"
            fi
            if [ -n "${{ inputs.prerelease }}" ]; then
              CMD="$CMD --prerelease ${{ inputs.prerelease }}"
            fi
            if [ -n "${{ inputs.stage-files }}" ]; then
              for p in ${{ inputs.stage-files }}; do
                CMD="$CMD --stage-files \"$p\""
              done
            fi
            if [ "${{ inputs.sign-tags }}" = "true" ]; then
              CMD="$CMD --sign-tags"
            fi
            if [ "${{ inputs.draft }}" = "true" ]; then
              CMD="$CMD --draft"
            fi
            if [ -n "${{ inputs.git-user-name }}" ]; then
              CMD="$CMD --git-user-name \"${{ inputs.git-user-name }}\""
            fi
            if [ -n "${{ inputs.git-user-email }}" ]; then
              CMD="$CMD --git-user-email \"${{ inputs.git-user-email }}\""
            fi
            ;;
          *)
            echo "::error::Invalid mode: $MODE (expected plan|prepare|release)"
            exit 1
            ;;
        esac

        set +e
        JSON_OUTPUT=$(eval sr $CMD | tail -1)
        EXIT_CODE=${PIPESTATUS[0]}
        set -e

        if [ "$EXIT_CODE" -eq 0 ]; then
          echo "json=${JSON_OUTPUT}" >> "$GITHUB_OUTPUT"
          echo "version=$(echo "$JSON_OUTPUT" | jq -r '.version // ""')" >> "$GITHUB_OUTPUT"
          echo "previous_version=$(echo "$JSON_OUTPUT" | jq -r '.previous_version // ""')" >> "$GITHUB_OUTPUT"
          echo "tag=$(echo "$JSON_OUTPUT" | jq -r '.tag // .tag_name // ""')" >> "$GITHUB_OUTPUT"
          echo "bump=$(echo "$JSON_OUTPUT" | jq -r '.bump // ""')" >> "$GITHUB_OUTPUT"
          echo "floating_tag=$(echo "$JSON_OUTPUT" | jq -r '.floating_tag // ""')" >> "$GITHUB_OUTPUT"
          echo "commit_count=$(echo "$JSON_OUTPUT" | jq -r '.commit_count // 0')" >> "$GITHUB_OUTPUT"
          if [ "$MODE" = "release" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi
        elif [ "$EXIT_CODE" -eq 2 ]; then
          echo "::notice::No releasable changes found"
          echo "released=false" >> "$GITHUB_OUTPUT"
        else
          echo "released=false" >> "$GITHUB_OUTPUT"
          echo "::error::sr failed with exit code ${EXIT_CODE}"
          exit "$EXIT_CODE"
        fi
