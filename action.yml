name: "SR - Semantic Release"
description: "Automated semantic versioning and release management — single binary, zero-config, language-agnostic."
author: "urmzd"

branding:
  icon: "upload-cloud"
  color: "green"

inputs:
  dry-run:
    description: "Run 'sr status' instead of 'sr release' to preview without making changes"
    default: "false"
  github-token:
    description: "GitHub token for creating releases"
    default: ${{ github.token }}
  git-user-name:
    description: "Git author/committer name for the release commit and tag. Pass empty string to let sr.yaml (git.user.name) or the repo's local git config take over."
    default: "sr-releaser[bot]"
  git-user-email:
    description: "Git author/committer email for the release commit and tag. Pass empty string to let sr.yaml (git.user.email) or the repo's local git config take over."
    default: "sr-releaser[bot]@users.noreply.github.com"
  artifacts:
    description: "Glob patterns for artifact files to upload (space-separated, passed as --artifacts)"
    default: ""
  package:
    description: "Target a specific package in a monorepo (matched by path)"
    default: ""
  channel:
    description: "Release channel name (e.g. canary, rc, stable) — must match a channel defined in sr.yaml"
    default: ""
  prerelease:
    description: "Pre-release identifier override (e.g. alpha, beta, rc). Overrides the channel's prerelease setting"
    default: ""
  stage-files:
    description: "Additional file globs to stage in the release commit (space-separated)"
    default: ""
  sign-tags:
    description: "Sign tags with GPG/SSH. Overrides git.sign_tags in sr.yaml"
    default: "false"
  draft:
    description: "Create GitHub release as a draft. Overrides the channel's draft setting"
    default: "false"
  sha256:
    description: "Expected SHA256 checksum of the sr binary"
    default: ""

outputs:
  version:
    description: "The released version (empty if no release)"
    value: ${{ steps.release.outputs.version }}
  previous-version:
    description: "The previous version before this release (empty if first release)"
    value: ${{ steps.release.outputs.previous_version }}
  tag:
    description: "The git tag created for this release (empty if no release)"
    value: ${{ steps.release.outputs.tag }}
  bump:
    description: "The bump level applied (major/minor/patch, empty if no release)"
    value: ${{ steps.release.outputs.bump }}
  floating-tag:
    description: "The floating major tag (e.g. v3, empty if disabled or no release)"
    value: ${{ steps.release.outputs.floating_tag }}
  commit-count:
    description: "Number of commits included in this release"
    value: ${{ steps.release.outputs.commit_count }}
  released:
    description: "Whether a release was created (true/false)"
    value: ${{ steps.release.outputs.released }}
  json:
    description: "Full release metadata as JSON (empty if no release)"
    value: ${{ steps.release.outputs.json }}

runs:
  using: "composite"
  steps:
    - name: Download sr binary
      shell: bash
      env:
        SR_REPO: ${{ github.action_repository }}
        SR_REF: ${{ github.action_ref }}
        SR_SHA256: ${{ inputs.sha256 }}
      run: |
        set -euo pipefail
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64)        ARCH="x86_64" ;;
          aarch64|arm64) ARCH="aarch64" ;;
          *) echo "::error::Unsupported architecture: $ARCH"; exit 1 ;;
        esac
        case "$OS" in
          linux)  TARGET="${ARCH}-unknown-linux-musl" ;;
          darwin) TARGET="${ARCH}-apple-darwin" ;;
          *) echo "::error::Unsupported OS: $OS"; exit 1 ;;
        esac

        DEST="$HOME/.local/bin/sr"
        mkdir -p "$HOME/.local/bin"

        API="https://api.github.com/repos/${SR_REPO}"
        TAGS=$(curl -fsSL "${API}/releases?per_page=100" | jq -r '.[].tag_name')
        RELEASE_TAG=$(echo "$TAGS" | grep -xF "$SR_REF" | head -1 || true)
        [ -z "$RELEASE_TAG" ] && RELEASE_TAG=$(echo "$TAGS" | grep "^${SR_REF}\." | head -1 || true)
        [ -z "$RELEASE_TAG" ] && RELEASE_TAG=$(echo "$TAGS" | head -1)

        if [ -z "$RELEASE_TAG" ]; then
          echo "::error::No releases found for ${SR_REPO}"
          exit 1
        fi

        curl -fsSL "https://github.com/${SR_REPO}/releases/download/${RELEASE_TAG}/sr-${TARGET}" -o "$DEST"

        if [ -n "$SR_SHA256" ]; then
          ACTUAL=$(sha256sum "$DEST" | awk '{print $1}')
          if [ "$ACTUAL" != "$SR_SHA256" ]; then
            echo "::error::SHA256 mismatch: expected $SR_SHA256, got $ACTUAL"
            exit 1
          fi
        fi

        chmod +x "$DEST"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Run sr
      id: release
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -uo pipefail
        if [ "${{ inputs.dry-run }}" = "true" ]; then
          CMD="status --format json"
        else
          CMD="release"
          if [ -n "${{ inputs.artifacts }}" ]; then
            for glob in ${{ inputs.artifacts }}; do
              CMD="$CMD --artifacts \"$glob\""
            done
          fi
          if [ -n "${{ inputs.package }}" ]; then
            CMD="$CMD --package ${{ inputs.package }}"
          fi
          if [ -n "${{ inputs.channel }}" ]; then
            CMD="$CMD --channel ${{ inputs.channel }}"
          fi
          if [ -n "${{ inputs.prerelease }}" ]; then
            CMD="$CMD --prerelease ${{ inputs.prerelease }}"
          fi
          if [ -n "${{ inputs.stage-files }}" ]; then
            for glob in ${{ inputs.stage-files }}; do
              CMD="$CMD --stage-files \"$glob\""
            done
          fi
          if [ "${{ inputs.sign-tags }}" = "true" ]; then
            CMD="$CMD --sign-tags"
          fi
          if [ "${{ inputs.draft }}" = "true" ]; then
            CMD="$CMD --draft"
          fi
          if [ -n "${{ inputs.git-user-name }}" ]; then
            CMD="$CMD --git-user-name \"${{ inputs.git-user-name }}\""
          fi
          if [ -n "${{ inputs.git-user-email }}" ]; then
            CMD="$CMD --git-user-email \"${{ inputs.git-user-email }}\""
          fi
        fi
        set +e
        JSON_OUTPUT=$(eval sr $CMD | tail -1)
        EXIT_CODE=${PIPESTATUS[0]}
        set -e

        if [ "$EXIT_CODE" -eq 0 ]; then
          echo "json=${JSON_OUTPUT}" >> "$GITHUB_OUTPUT"
          echo "version=$(echo "$JSON_OUTPUT" | jq -r '.version')" >> "$GITHUB_OUTPUT"
          echo "previous_version=$(echo "$JSON_OUTPUT" | jq -r '.previous_version')" >> "$GITHUB_OUTPUT"
          echo "tag=$(echo "$JSON_OUTPUT" | jq -r '.tag')" >> "$GITHUB_OUTPUT"
          echo "bump=$(echo "$JSON_OUTPUT" | jq -r '.bump')" >> "$GITHUB_OUTPUT"
          echo "floating_tag=$(echo "$JSON_OUTPUT" | jq -r '.floating_tag')" >> "$GITHUB_OUTPUT"
          echo "commit_count=$(echo "$JSON_OUTPUT" | jq -r '.commit_count')" >> "$GITHUB_OUTPUT"
          echo "released=true" >> "$GITHUB_OUTPUT"
        elif [ "$EXIT_CODE" -eq 2 ]; then
          echo "::notice::No releasable changes found"
          echo "released=false" >> "$GITHUB_OUTPUT"
        else
          echo "released=false" >> "$GITHUB_OUTPUT"
          echo "::error::sr failed with exit code ${EXIT_CODE}"
          exit "$EXIT_CODE"
        fi
