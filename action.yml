name: "SR - Semantic Release"
description: "Automated semantic versioning and release management — single binary, zero-config, language-agnostic."
author: "urmzd"

branding:
  icon: "upload-cloud"
  color: "green"

inputs:
  command:
    description: "The sr subcommand to run (release, plan, changelog, version, config, init, completions, commit, rebase, review, explain, branch, pr, ask, cache, hook, update)"
    default: "release"
  dry-run:
    description: "Preview changes without executing them"
    default: "false"
  force:
    description: "Re-release the current tag (use when a previous release partially failed)"
    default: "false"
  config:
    description: "Path to the config file"
    default: "sr.yaml"
  github-token:
    description: "GitHub token for creating releases"
    default: ${{ github.token }}
  git-user-name:
    description: "Git user name for tag creation"
    default: "sr[bot]"
  git-user-email:
    description: "Git user email for tag creation"
    default: "sr[bot]@urmzd.com"
  artifacts:
    description: "Glob patterns for artifact files to upload (newline or comma separated)"
    default: ""
  build-command:
    description: "Shell command to run after version bump, before commit (SR_VERSION and SR_TAG env vars available)"
    default: ""
  sha256:
    description: "Expected SHA256 checksum of the sr binary (hex string). When provided, the downloaded binary is verified against this value."
    default: ""

outputs:
  version:
    description: "The released version (empty if no release)"
    value: ${{ steps.release.outputs.version }}
  previous-version:
    description: "The previous version before this release (empty if first release)"
    value: ${{ steps.release.outputs.previous_version }}
  tag:
    description: "The git tag created for this release (empty if no release)"
    value: ${{ steps.release.outputs.tag }}
  bump:
    description: "The bump level applied (major/minor/patch, empty if no release)"
    value: ${{ steps.release.outputs.bump }}
  floating-tag:
    description: "The floating major tag (e.g. v3, empty if disabled or no release)"
    value: ${{ steps.release.outputs.floating_tag }}
  commit-count:
    description: "Number of commits included in this release"
    value: ${{ steps.release.outputs.commit_count }}
  released:
    description: "Whether a release was created (true/false)"
    value: ${{ steps.release.outputs.released }}
  json:
    description: "Full release metadata as JSON (empty if no release)"
    value: ${{ steps.release.outputs.json }}

runs:
  using: "composite"
  steps:
    - name: Configure git identity
      shell: bash
      run: |
        echo "::group::Configure git identity"
        echo "Setting user.name=${{ inputs.git-user-name }}"
        git config user.name "${{ inputs.git-user-name }}"
        echo "Setting user.email=${{ inputs.git-user-email }}"
        git config user.email "${{ inputs.git-user-email }}"
        echo "::endgroup::"

    - name: Download sr binary
      shell: bash
      env:
        SR_REPO: ${{ github.action_repository }}
        SR_REF: ${{ github.action_ref }}
        SR_SHA256: ${{ inputs.sha256 }}
      run: |
        set -euo pipefail
        echo "::group::Download sr binary"

        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        echo "Detected OS=$OS ARCH=$ARCH"
        case "$ARCH" in
          x86_64)        ARCH="x86_64" ;;
          aarch64|arm64) ARCH="aarch64" ;;
          *) echo "::error::Unsupported architecture: $ARCH"; exit 1 ;;
        esac
        case "$OS" in
          linux)  TARGET="${ARCH}-unknown-linux-musl" ;;
          darwin) TARGET="${ARCH}-apple-darwin" ;;
          *) echo "::error::Unsupported OS: $OS"; exit 1 ;;
        esac

        BINARY_NAME="sr-${TARGET}"
        DEST="$HOME/.local/bin/sr"
        mkdir -p "$HOME/.local/bin"
        echo "Target=$TARGET Binary=$BINARY_NAME"

        # Resolve the action ref to a concrete release tag.
        # Floating tags (e.g. v1) are git tags — not releases — so we resolve
        # them to the latest release sharing the same major version.
        resolve_release_tag() {
          local api="$1" ref="$2"

          if ! command -v jq &>/dev/null; then
            echo "::error::jq is required but not found. Install jq or use a GitHub-hosted runner."
            exit 1
          fi

          # Try exact tag match (works for non-floating refs like v1.2.3).
          # curl without -f so a 404 returns JSON instead of exit 22.
          local tag
          tag=$(curl -sSL -H "Accept: application/vnd.github+json" \
            "${api}/releases/tags/${ref}" 2>/dev/null \
            | jq -r '.tag_name // empty') || true

          if [ -n "$tag" ]; then
            echo "$tag"
            return
          fi

          echo "No exact release for ref=${ref}, searching by major version..." >&2
          local releases
          releases=$(curl -fsSL -H "Accept: application/vnd.github+json" \
            "${api}/releases?per_page=20")

          local major
          major=$(echo "$ref" | grep -oE '^v[0-9]+') || true
          if [ -n "$major" ]; then
            echo "Matching major version prefix: ${major}" >&2
            tag=$(echo "$releases" | jq -r --arg m "${major}." \
              '[.[] | .tag_name | select(startswith($m))][0] // empty')
          fi

          if [ -z "$tag" ]; then
            echo "Falling back to latest release" >&2
            tag=$(echo "$releases" | jq -r '.[0].tag_name // empty')
          fi

          echo "$tag"
        }

        API="https://api.github.com/repos/${SR_REPO}"
        echo "Resolving ref=${SR_REF} via ${API}"
        RELEASE_TAG=$(resolve_release_tag "$API" "$SR_REF")

        if [ -z "$RELEASE_TAG" ]; then
          echo "::error::Could not resolve ref '${SR_REF}' to a release tag"
          exit 1
        fi

        echo "Resolved release tag: ${RELEASE_TAG}"
        URL="https://github.com/${SR_REPO}/releases/download/${RELEASE_TAG}/${BINARY_NAME}"
        echo "Downloading from ${URL}"
        curl -fsSL "$URL" -o "$DEST"

        if [ -n "$SR_SHA256" ]; then
          ACTUAL=$(sha256sum "$DEST" | awk '{print $1}')
          if [ "$ACTUAL" != "$SR_SHA256" ]; then
            echo "::error::SHA256 mismatch: expected $SR_SHA256, got $ACTUAL"
            exit 1
          fi
          echo "SHA256 verified: $ACTUAL"
        fi

        chmod +x "$DEST"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        echo "sr binary installed to ${DEST}"
        echo "::endgroup::"

    - name: Run sr
      id: release
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        SR_BUILD_COMMAND: ${{ inputs.build-command }}
      run: |
        set -uo pipefail
        echo "::group::Run sr"
        ARGS=()
        ARGS+=("${{ inputs.command }}")
        if [ "${{ inputs.dry-run }}" = "true" ]; then
          ARGS+=("--dry-run")
        fi
        if [ "${{ inputs.force }}" = "true" ]; then
          ARGS+=("--force")
        fi
        IFS=$'\n,' read -ra PATTERNS <<< "${{ inputs.artifacts }}"
        for pattern in "${PATTERNS[@]}"; do
          trimmed=$(echo "$pattern" | xargs)
          if [ -n "$trimmed" ]; then
            ARGS+=("--artifacts" "$trimmed")
          fi
        done

        if [ -n "$SR_BUILD_COMMAND" ]; then
          _BUILD_SCRIPT=$(mktemp /tmp/sr-build-XXXXXX.sh)
          printf '%s' "$SR_BUILD_COMMAND" > "$_BUILD_SCRIPT"
          chmod +x "$_BUILD_SCRIPT"
          ARGS+=("--build-command" "bash $_BUILD_SCRIPT")
        fi

        echo "Executing: sr ${ARGS[*]}"
        set +e
        JSON_OUTPUT=$(sr "${ARGS[@]}" | tail -1)
        EXIT_CODE=${PIPESTATUS[0]}
        set -e
        echo "sr exited with code ${EXIT_CODE}"

        if [ "$EXIT_CODE" -eq 0 ]; then
          echo "json=${JSON_OUTPUT}" >> "$GITHUB_OUTPUT"
          echo "version=$(echo "$JSON_OUTPUT" | jq -r '.version')" >> "$GITHUB_OUTPUT"
          echo "previous_version=$(echo "$JSON_OUTPUT" | jq -r '.previous_version')" >> "$GITHUB_OUTPUT"
          echo "tag=$(echo "$JSON_OUTPUT" | jq -r '.tag')" >> "$GITHUB_OUTPUT"
          echo "bump=$(echo "$JSON_OUTPUT" | jq -r '.bump')" >> "$GITHUB_OUTPUT"
          echo "floating_tag=$(echo "$JSON_OUTPUT" | jq -r '.floating_tag')" >> "$GITHUB_OUTPUT"
          echo "commit_count=$(echo "$JSON_OUTPUT" | jq -r '.commit_count')" >> "$GITHUB_OUTPUT"
          echo "released=true" >> "$GITHUB_OUTPUT"
        elif [ "$EXIT_CODE" -eq 2 ]; then
          echo "::notice::No releasable changes found"
          echo "json=" >> "$GITHUB_OUTPUT"
          echo "version=" >> "$GITHUB_OUTPUT"
          echo "previous_version=" >> "$GITHUB_OUTPUT"
          echo "tag=" >> "$GITHUB_OUTPUT"
          echo "bump=" >> "$GITHUB_OUTPUT"
          echo "floating_tag=" >> "$GITHUB_OUTPUT"
          echo "commit_count=" >> "$GITHUB_OUTPUT"
          echo "released=false" >> "$GITHUB_OUTPUT"
        else
          echo "json=" >> "$GITHUB_OUTPUT"
          echo "version=" >> "$GITHUB_OUTPUT"
          echo "previous_version=" >> "$GITHUB_OUTPUT"
          echo "tag=" >> "$GITHUB_OUTPUT"
          echo "bump=" >> "$GITHUB_OUTPUT"
          echo "floating_tag=" >> "$GITHUB_OUTPUT"
          echo "commit_count=" >> "$GITHUB_OUTPUT"
          echo "released=false" >> "$GITHUB_OUTPUT"
          echo "::error::sr failed with exit code ${EXIT_CODE}"
          echo "::endgroup::"
          exit "$EXIT_CODE"
        fi
        echo "::endgroup::"
